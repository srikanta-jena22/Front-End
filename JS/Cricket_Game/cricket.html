<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cricket Game</title>
  <style>
    body{
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Cricket Game</h1>

  <button onclick="playGame('Bat')">Bat</button>
  <button onclick="playGame('Ball')">Ball</button>
  <button onclick="playGame('Stump')">Stump</button>

  <script>

    let score = {
      won: 0,
      loss: 0,
      tie: 0,
      displayScore(){
        return `Won:${score.won}, Loss:${score.loss}, Tie:${score.tie}`;
      }
    };
    function playGame(userChoice){

      let userChoiceMessage = `You have chosen ${userChoice}`;

      // Generate random number between 0 and 3
      let randomNumber = Math.floor(Math.random() * 3);

      let computerChoice;

      if(randomNumber === 0){
        computerChoice = 'Bat';
      }
      else if(randomNumber === 1){
        computerChoice = 'Ball';
      }
      else{
        computerChoice = 'Stump';
      }

      let computerChoiceMessage = `Computer choice is ${computerChoice}`;
      let resultMessage;

      if(userChoice === computerChoice){
        resultMessage = "It's a tie";
        score.tie+=1
      }
      else if(
        (userChoice === 'Bat' && computerChoice === 'Ball') ||
        (userChoice === 'Ball' && computerChoice === 'Stump') ||
        (userChoice === 'Stump' && computerChoice === 'Bat')
      ){
        resultMessage = "User won";
        score.won+=1
      }
      else{
        resultMessage = "Computer won";
        score.loss+=1
      }

      alert(`${userChoiceMessage}. ${computerChoiceMessage}. 
      ${resultMessage}.
      ${score.displayScore()}`);
    }
  </script>

</body>
</html>
